{% extends "layout.html" %}
{% block main %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <h2 class="text-center mb-4"><i class="bi bi-person-plus text-primary"></i> {{ t.title_register }}</h2>
        <form method="post" action="/register">
          <input type="hidden" name="lang" value="{{ current_lang }}">
          <div class="mb-3">
            <label class="form-label">{{ t.label_username }}</label>
            <input autofocus class="form-control" name="username" type="text" autocomplete="off">
          </div>
          <div class="mb-3">
            <label class="form-label">{{ t.label_password }}</label>
            <input class="form-control" name="password" type="password">
          </div>
          <div class="mb-3">
            <label class="form-label">{{ t.label_confirm_password }}</label>
            <input class="form-control" name="confirmation" type="password">
          </div>
          <button class="btn btn-primary w-100" type="submit">{{ t.btn_register }}</button>
        </form>
        <hr>
        <p class="text-center mb-0">{{ t.register_have_account }} <a href="/login">{{ t.btn_login }}</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends "layout.html" %}
{% block title %}Register{% endblock %}
{% block main %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <h2 class="text-center mb-4"><i class="bi bi-person-plus text-primary"></i> Register</h2>
        <form method="post" action="/register">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input autofocus class="form-control" name="username" type="text" autocomplete="off">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" name="password" type="password">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input class="form-control" name="confirmation" type="password">
          </div>
          <button class="btn btn-primary w-100" type="submit">Create Account</button>
        </form>
        <hr>
        <p class="text-center mb-0">Already have an account? <a href="/login">Log In</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

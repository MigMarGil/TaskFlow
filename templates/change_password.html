{% extends "layout.html" %}
{% block main %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-4"><i class="bi bi-key"></i> {{ t.title_change_password }}</h2>
    <form method="post" action="/change_password">
      <div class="mb-3">
        <label class="form-label">{{ t.label_current_password }}</label>
        <input autofocus class="form-control" name="current_password" type="password">
      </div>
      <div class="mb-3">
        <label class="form-label">{{ t.label_new_password }}</label>
        <input class="form-control" name="new_password" type="password">
      </div>
      <div class="mb-3">
        <label class="form-label">{{ t.label_confirm_new }}</label>
        <input class="form-control" name="confirm_password" type="password">
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">{{ t.btn_change_password }}</button>
        <a href="/" class="btn btn-outline-secondary">{{ t.btn_cancel }}</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
